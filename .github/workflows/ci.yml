name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm i -g pnpm
            pnpm install --frozen-lockfile
          else
            npm install
          fi
      - run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm typecheck
          else
            npm run typecheck
          fi
      - run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm lint
          else
            npm run lint
          fi
      - run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm test
          else
            npm test
          fi
      - run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm build
          else
            npm run build
          fi
